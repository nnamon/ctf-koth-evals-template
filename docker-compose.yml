services:
  serve:
    build: .
    image: ctf-evals
    command: serve
    ports:
      - "${CTF_EVALS_PORT:-8080}:8080"
    environment:
      CTF_EVALS_PASSWORD: ${CTF_EVALS_PASSWORD:?set CTF_EVALS_PASSWORD in .env}
      CTF_EVALS_WORKER_TOKEN: ${CTF_EVALS_WORKER_TOKEN:?set CTF_EVALS_WORKER_TOKEN in .env}
    volumes:
      - db-data:/app/data
    restart: unless-stopped

  worker:
    image: ctf-evals
    command: worker
    depends_on:
      - serve
    environment:
      CTF_EVALS_WORKER_TOKEN: ${CTF_EVALS_WORKER_TOKEN:?set CTF_EVALS_WORKER_TOKEN in .env}
      CTF_EVALS_SERVER_URL: http://serve:8080
    volumes:
      - worker-cache:/app/data
    restart: unless-stopped

volumes:
  db-data:
  worker-cache:
